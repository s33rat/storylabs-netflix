							<head><style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Barlow:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}

.stage{
  background:#0A0A0A;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:72px 48px 60px;
  min-height:280px;
  position:relative;
}

.lockup{
  display:inline-flex;
  flex-direction:column;
  align-items:flex-start;
  gap:0;
}

.endorsement{
  font-family:'Barlow',sans-serif;
  font-size:9px;font-weight:600;
  letter-spacing:0.26em;text-transform:uppercase;
  color:#E50914;
  margin-bottom:7px;
  opacity:0;
  animation:endFade 0.35s ease calc(var(--spd,1) * 3.05s) both;
}

.mark-row{
  display:flex;align-items:center;
  gap:20px;
}

.wordmark-wrap{
  overflow:hidden;
  display:inline-block;
  line-height:1;
}

.wordmark{
  font-family:'Cormorant Garamond',serif;
  font-size:46px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  color:#F5F2EE;
  line-height:1;
  display:block;
  transform:translateX(-6px);
  opacity:0;
  animation:wordIn 0.7s cubic-bezier(0.4,0,0.2,1) calc(var(--spd,1) * 3.3s) both;
}

.est-date{
  font-family:'Barlow',sans-serif;
  font-size:8px;font-weight:500;
  letter-spacing:0.28em;text-transform:uppercase;
  color:rgba(245,242,238,0.38);
  margin-top:12px;
  margin-left:120px;
  opacity:0;
  animation:endFade 0.5s ease calc(var(--spd,1) * 3.9s) both;
}

@keyframes dash{to{stroke-dashoffset:0}}
@keyframes endFade{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes wordIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}

.ll{stroke-dasharray:52;stroke-dashoffset:52;animation:dash 0.52s cubic-bezier(0.2,0,0.6,1) calc(var(--spd,1)*0.5s) both;}
.lt{stroke-dasharray:98;stroke-dashoffset:98;animation:dash 0.78s cubic-bezier(0.4,0,0.5,1) calc(var(--spd,1)*1.02s) both;}
.lb{stroke-dasharray:98;stroke-dashoffset:98;animation:dash 0.78s cubic-bezier(0.4,0,0.5,1) calc(var(--spd,1)*1.02s) both;}
.lr{stroke-dasharray:27;stroke-dashoffset:27;animation:dash 0.62s cubic-bezier(0.65,0,0.2,1) calc(var(--spd,1)*2.1s) both;}

.phases{
  display:flex;gap:3px;
  margin-top:32px;
}
.ph{
  height:2px;width:40px;
  background:rgba(245,242,238,0.1);
  position:relative;overflow:hidden;
}
.ph::after{
  content:'';position:absolute;
  left:0;top:0;bottom:0;width:0;
  background:#F5F2EE;
}
.ph.red::after{background:#E50914;}

.ph1::after{animation:phFill 0.52s linear calc(var(--spd,1)*0.5s) both;}
.ph2::after{animation:phFill 0.78s linear calc(var(--spd,1)*1.02s) both;}
.ph3::after{animation:phFill 0.62s linear calc(var(--spd,1)*2.1s) both;}
.ph4::after{animation:phFill 0.35s linear calc(var(--spd,1)*3.05s) both;}
.ph5::after{animation:phFill 0.7s linear calc(var(--spd,1)*3.3s) both;}
@keyframes phFill{from{width:0}to{width:100%}}

.ph-labels{
  display:flex;gap:3px;
  margin-top:5px;
}
.phl{
  width:40px;
  font-family:'Barlow',sans-serif;
  font-size:8px;font-weight:500;
  letter-spacing:0.08em;
  color:rgba(245,242,238,0.25);
  text-align:center;
}

.controls{
  padding:18px 24px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:0.5px solid var(--color-border-tertiary);
  background:var(--color-background-secondary);
}

.ctrl-left{
  display:flex;align-items:center;gap:10px;
}
.ctrl-label{
  font-size:11px;font-weight:500;
  color:var(--color-text-secondary);
  letter-spacing:0.04em;
}
.spd-btn{
  font-size:11px;font-weight:500;
  letter-spacing:0.08em;
  padding:5px 10px;
  background:transparent;
  border:0.5px solid var(--color-border-secondary);
  color:var(--color-text-secondary);
  cursor:pointer;
  transition:all 0.15s;
  border-radius:var(--border-radius-md);
}
.spd-btn.active{
  background:var(--color-background-primary);
  color:var(--color-text-primary);
  border-color:var(--color-border-primary);
}
.spd-btn:hover{color:var(--color-text-primary);}

.replay-btn{
  font-size:11px;font-weight:500;
  letter-spacing:0.1em;
  padding:7px 16px;
  background:transparent;
  border:0.5px solid var(--color-border-secondary);
  color:var(--color-text-primary);
  cursor:pointer;
  border-radius:var(--border-radius-md);
  transition:background 0.15s;
}
.replay-btn:hover{background:var(--color-background-secondary);}

.variants-row{
  display:grid;grid-template-columns:repeat(3,1fr);gap:2px;
  border-top:0.5px solid var(--color-border-tertiary);
}
.vcard{
  background:var(--color-background-secondary);
  padding:20px 20px;
  display:flex;flex-direction:column;align-items:flex-start;gap:0;
}
.vcard.light-bg{background:#F5F2EE;}
.vcard-label{
  font-size:9px;font-weight:600;letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--color-text-tertiary);
  margin-bottom:14px;
}
.vcard.light-bg .vcard-label{color:rgba(10,10,10,0.4);}

.v-endorse{
  font-family:'Barlow',sans-serif;font-size:7.5px;font-weight:600;
  letter-spacing:0.24em;text-transform:uppercase;color:#E50914;margin-bottom:5px;
}
.v-row{display:flex;align-items:center;gap:14px;}
.v-wm{
  font-family:'Cormorant Garamond',serif;
  font-weight:500;letter-spacing:0.1em;text-transform:uppercase;line-height:1;
}
.v-wm.dk{color:#F5F2EE;}
.v-wm.lt{color:#0A0A0A;}
.v-wm.lg{font-size:28px;}
.v-wm.sm{font-size:20px;}
.v-wm.xs{font-size:14px;}

.v-est{
  font-family:'Barlow',sans-serif;
  font-size:7.5px;font-weight:500;
  letter-spacing:0.28em;text-transform:uppercase;
  margin-top:12px;
}
.v-est.dk{color:rgba(245,242,238,0.35);}
.v-est.lt{color:rgba(10,10,10,0.38);}
</style>

</head><body><div class="stage" id="stage">
  <div class="lockup" id="lockup">
    <div class="endorsement" id="endorse">A Netflix Unit</div>
    <div class="mark-row">

      <svg id="frame-svg" width="100" height="54" viewBox="0 0 100 54" style="flex-shrink:0;">
        <line class="ll" x1="1.5" y1="1.5" x2="1.5" y2="52.5" stroke="#F5F2EE" stroke-width="2" stroke-linecap="square"></line>
        <line class="lt" x1="1.5" y1="1.5" x2="98.5" y2="1.5" stroke="#F5F2EE" stroke-width="2" stroke-linecap="square"></line>
        <line class="lb" x1="1.5" y1="52.5" x2="98.5" y2="52.5" stroke="#F5F2EE" stroke-width="2" stroke-linecap="square"></line>
        <line class="lr" x1="98.5" y1="1.5" x2="98.5" y2="27.75" stroke="#E50914" stroke-width="2" stroke-linecap="square"></line>
      </svg>

      <div class="wordmark-wrap">
        <span class="wordmark" id="wm">StoryLab</span>
      </div>

    </div>
    <div class="est-date" id="est-date">Est. 2026</div>
  </div>

  <div class="phases" id="phases">
    <div class="ph ph1"><div></div></div>

    <div class="ph ph3 red"><div></div></div>
    <div class="ph ph4"><div></div></div>
    <div class="ph ph5"><div></div></div>
  </div>
  <div class="ph-labels">
    <div class="phl">left edge</div>
    <div class="phl">frame</div>
    <div class="phl">activation</div>
    <div class="phl">unit</div>
    <div class="phl">wordmark</div>
  </div>
</div>

<div class="controls">
  <div class="ctrl-left">
    <span class="ctrl-label">Speed</span>
    <button class="spd-btn" data-spd="1.6">Slow</button>
    <button class="spd-btn active" data-spd="1">Normal</button>
    <button class="spd-btn" data-spd="0.5">Fast</button>
  </div>
  <button class="replay-btn" id="replay-btn">Replay →</button>
</div>

<div class="variants-row">
  <div class="vcard" style="background:#0A0A0A;">
    <div class="vcard-label" style="color:rgba(245,242,238,0.25);">Primary — dark</div>
    <div class="v-endorse">A Netflix Unit</div>
    <div class="v-row">
      <svg width="52" height="28" viewBox="0 0 52 28">
        <line x1="1" y1="1" x2="1" y2="27" stroke="#F5F2EE" stroke-width="1.5" stroke-linecap="square"></line>
        <line x1="1" y1="1" x2="51" y2="1" stroke="#F5F2EE" stroke-width="1.5" stroke-linecap="square"></line>
        <line x1="1" y1="27" x2="51" y2="27" stroke="#F5F2EE" stroke-width="1.5" stroke-linecap="square"></line>
        <line x1="51" y1="1" x2="51" y2="14" stroke="#E50914" stroke-width="1.5" stroke-linecap="square"></line>
      </svg>
      <span class="v-wm dk lg">StoryLab</span>
    </div>
    <div class="v-est dk">Est. 2026</div>
  </div>
  <div class="vcard light-bg">
    <div class="vcard-label">Secondary — light</div>
    <div class="v-endorse">A Netflix Unit</div>
    <div class="v-row">
      <svg width="52" height="28" viewBox="0 0 52 28">
        <line x1="1" y1="1" x2="1" y2="27" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="square"></line>
        <line x1="1" y1="1" x2="51" y2="1" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="square"></line>
        <line x1="1" y1="27" x2="51" y2="27" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="square"></line>
        <line x1="51" y1="1" x2="51" y2="14" stroke="#E50914" stroke-width="1.5" stroke-linecap="square"></line>
      </svg>
      <span class="v-wm lt lg">StoryLab</span>
    </div>
    <div class="v-est lt">Est. 2026</div>
  </div>
  <div class="vcard" style="background:#111;">
    <div class="vcard-label" style="color:rgba(245,242,238,0.22);">Stacked — square contexts</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;">
      <div class="v-endorse" style="align-self:center;">A Netflix Unit</div>
      <svg width="46" height="25" viewBox="0 0 46 25">
        <line x1="1" y1="1" x2="1" y2="24" stroke="#F5F2EE" stroke-width="1.5" stroke-linecap="square"></line>
        <line x1="1" y1="1" x2="45" y2="1" stroke="#F5F2EE" stroke-width="1.5" stroke-linecap="square"></line>
        <line x1="1" y1="24" x2="45" y2="24" stroke="#F5F2EE" stroke-width="1.5" stroke-linecap="square"></line>
        <line x1="45" y1="1" x2="45" y2="12.5" stroke="#E50914" stroke-width="1.5" stroke-linecap="square"></line>
      </svg>
      <span class="v-wm dk sm" style="text-align:center;">StoryLab</span>
      <div class="v-est dk" style="text-align:center;">Est. 2026</div>
    </div>
  </div>
</div>

<script>
(function(){
  let currentSpd = 1;
  const stage = document.getElementById('stage');
  const animated = ['endorse','wm'];
  const svgLines = ['ll','lt','lb','lr'];

  function setSpeed(spd){
    currentSpd = spd;
    stage.style.setProperty('--spd', spd);
  }

  function replay(){
    const all = stage.querySelectorAll('.ll,.lt,.lb,.lr,.endorsement,.wordmark,.est-date,.ph');
    all.forEach(el => {
      el.style.animation = 'none';
      el.getBoundingClientRect();
    });
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        all.forEach(el => { el.style.animation = ''; });
      });
    });
  }

  document.querySelectorAll('.spd-btn').forEach(btn => {
    btn.addEventListener('click', function(){
      document.querySelectorAll('.spd-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      setSpeed(parseFloat(this.dataset.spd));
      replay();
    });
  });

  document.getElementById('replay-btn').addEventListener('click', replay);
  setSpeed(1);
})();
</script>
